name: Deploy Web (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - 'packages/web/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: packages/web/package-lock.json

      - name: Install
        working-directory: packages/web
        run: npm ci

      - name: Build
        working-directory: packages/web
        env:
          VITE_USE_MOCK: 'false'
          VITE_SUPABASE_URL: https://kbjcikgoawxhotwwqtin.supabase.co
          # anon key — 前端公开密钥，随静态站打包
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtiamNpa2dvYXd4aG90d3dxdGluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxNzU4NzcsImV4cCI6MjA5ODc1MTg3N30.msWhe0oqAf_lmQoHOE5BmrMTDNevRls0qjUA-vnqfYQ
        run: npm run build -- --base=/agentwatch/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
